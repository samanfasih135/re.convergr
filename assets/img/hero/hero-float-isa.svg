<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <linearGradient id="isa-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="isa-f">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: verified seal -->
  <circle cx="100" cy="88" r="44" stroke="url(#isa-a)" stroke-width="2.5" fill="rgba(8,10,18,0.88)" filter="url(#isa-f)"/>
  <circle cx="100" cy="88" r="36" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <path d="M78 90 L94 106 L124 72" stroke="#22D3EE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="13" fill="#F4F2FA">ISA-Verified</text>
  <text x="100" y="200" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="700" font-size="13" fill="#F4F2FA">Leads</text>
