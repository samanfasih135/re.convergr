<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convergr Redirect</title>
</head>
<body>
    <script>
        (function forwardToApp() {
            const AUTH_FLAG_KEY = "convergr_main_app_authenticated";
            const params = new URLSearchParams(location.search);
            const hasAuth = params.get("auth") === "1" || params.get("authenticated") === "1" || params.get("authenticated") === "true";

            if (hasAuth) {
                sessionStorage.setItem(AUTH_FLAG_KEY, "1");
                localStorage.setItem(AUTH_FLAG_KEY, "1");
                location.replace("/index.html");
                return;
            }

            const alreadyAuthed = sessionStorage.getItem(AUTH_FLAG_KEY) === "1" || localStorage.getItem(AUTH_FLAG_KEY) === "1";
            if (alreadyAuthed) {
                location.replace("/index.html");
            } else {
                location.replace("https://convergr.vercel.app");
            }
        })();
    </script>
</body>
</html>
