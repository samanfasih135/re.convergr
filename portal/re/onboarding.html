<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RE Onboarding</title><link rel="stylesheet" href="/portal/portal.css">
<style>
    .re-onboarding-wrap {
        width: min(1040px, 100%);
        margin: 1.5rem auto 0;
    }
    .re-onboarding-card {
        border-radius: 28px;
        padding: 1.4rem;
        background:
            radial-gradient(80% 90% at 8% 0%, rgba(124, 73, 192, 0.28) 0%, transparent 70%),
            rgba(16, 12, 29, 0.82);
        border: 1px solid rgba(255,255,255,.14);
        box-shadow: 0 28px 60px rgba(0,0,0,.4);
    }
    .re-onboarding-header {
        text-align: center;
        margin-bottom: .9rem;
    }
    .re-onboarding-header .headline {
        font-size: clamp(2rem, 3.4vw, 2.65rem);
        margin-bottom: .45rem;
    }
    .re-onboarding-header .sub {
        margin: 0 auto;
        max-width: 58ch;
    }
    .progress {
        height: 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255,255,255,.14);
    }
    .progress > span {
        background: linear-gradient(90deg, #5B2D8E, #9d5de4);
        box-shadow: 0 0 18px rgba(146, 92, 230, .34);
    }
    .step-shell {
        margin-top: 1rem;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 20px;
        background: rgba(9, 8, 16, 0.52);
        padding: 1rem;
    }
    #re-onboard label {
        color: #e5dbf6;
        font-size: .86rem;
        letter-spacing: .01em;
    }
    #re-onboard input,
    #re-onboard select,
    #re-onboard textarea {
        background: rgba(8, 8, 14, 0.74);
        border-color: rgba(255, 255, 255, 0.2);
        transition: border-color .24s ease, box-shadow .24s ease, background .24s ease;
    }
    #re-onboard input:focus,
    #re-onboard select:focus,
    #re-onboard textarea:focus {
        border-color: rgba(183, 131, 251, 0.8);
        box-shadow: 0 0 0 3px rgba(91, 45, 142, 0.25), 0 0 24px rgba(146, 92, 230, 0.16);
    }
    .onboarding-actions {
        display: flex;
        justify-content: space-between;
        margin-top: 1.05rem;
        gap: .85rem;
        flex-wrap: wrap;
        border-top: 1px solid rgba(255,255,255,.1);
        padding-top: .9rem;
    }
    .onboarding-actions .btn {
        min-width: 132px;
    }
    @media (max-width: 860px) {
        .re-onboarding-wrap { margin-top: 1rem; }
        .re-onboarding-card { padding: 1rem; border-radius: 20px; }
        .step-shell { padding: .85rem; }
    }
</style></head>
<body>
<div class="ambient"></div>
<div class="portal-shell">
    <aside class="sidebar">
        <p class="brand">Convergr RE Portal</p>
        <a class="nav-link" href="/portal/re/index.html">Dashboard</a>
        <a class="nav-link" href="/portal/re/plans.html">Plans</a>
        <a class="nav-link active" href="/portal/re/onboarding.html">Onboarding</a>
        <a class="nav-link" href="/portal/re/support.html">Support</a>
        <a class="nav-link" href="#" data-logout>Logout</a>
    </aside>
    <main class="main container" style="max-width:none;width:auto;">
        <section class="glass card re-onboarding-wrap re-onboarding-card">
            <div class="re-onboarding-header">
                <h1 class="headline">RE Portal Onboarding</h1>
                <p class="sub">Complete setup in three steps to launch your lead delivery pipeline.</p>
            </div>
            <div class="progress"><span id="progress-fill" style="width:33%"></span></div>
            <form id="re-onboard" style="margin-top:1rem;">
                <div class="step" data-step="1">
                    <div class="grid-2 step-shell">
                        <div><label>Full Name</label><input required></div>
                        <div><label>Email</label><input type="email" required></div>
                        <div><label>Phone</label><input required></div>
                        <div><label>Brokerage</label><input required></div>
                    </div>
                </div>
                <div class="step hidden" data-step="2">
                    <div class="grid-2 step-shell">
                        <div><label>Service Area (ZIPs/Cities)</label><input required></div>
                        <div><label>Primary Focus</label><select><option>Buyer Leads</option><option>Seller Leads</option><option>Both</option></select></div>
                        <div><label>Monthly Referral Goal</label><input></div>
                        <div><label>Current Lead Source</label><input></div>
                    </div>
                </div>
                <div class="step hidden" data-step="3">
                    <div class="grid-2 step-shell">
                        <div><label>Preferred Plan</label><select><option>Starter</option><option>Growth</option><option>Ultra</option></select></div>
                        <div><label>CRM Platform</label><input placeholder="Follow Up Boss, KVCore, etc."></div>
                    </div>
                    <div class="step-shell" style="margin-top:.8rem;"><label>Notes</label><textarea rows="4" placeholder="Special lead criteria, appointment windows, team details..."></textarea></div>
                </div>
                <div class="onboarding-actions">
                    <button class="btn" type="button" id="prev-step">Back</button>
                    <button class="btn btn-primary" type="button" id="next-step">Continue</button>
                    <button class="btn btn-primary hidden" type="submit" id="submit-step">Finish Setup</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="/portal/auth.js"></script>
<script>
    requirePortal("re"); attachLogout();
    let step = 1;
    const fill = document.getElementById("progress-fill");
    const steps = [...document.querySelectorAll(".step")];
    const prev = document.getElementById("prev-step");
    const next = document.getElementById("next-step");
    const submit = document.getElementById("submit-step");
    function sync() {
        steps.forEach(s => s.classList.toggle("hidden", Number(s.dataset.step) !== step));
        fill.style.width = `${step * 33.33}%`;
        prev.style.visibility = step === 1 ? "hidden" : "visible";
        next.classList.toggle("hidden", step === 3);
        submit.classList.toggle("hidden", step !== 3);
    }
    prev.onclick = () => { if (step > 1) { step--; sync(); } };
    next.onclick = () => { if (step < 3) { step++; sync(); } };
    document.getElementById("re-onboard").onsubmit = (e) => { e.preventDefault(); alert("Onboarding submitted successfully."); location.href = "/portal/re/index.html"; };
    sync();
</script>
</body>
</html>
