<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VA Onboarding</title><link rel="stylesheet" href="/portal/portal.css">
<style>
    .va-onboard-wrap {
        width: min(1140px, 100%);
        margin: 1.5rem auto 0;
    }
    .va-onboard-card {
        border-radius: 28px;
        padding: 1.35rem;
        background:
            radial-gradient(90% 90% at 8% 0%, rgba(137, 82, 207, 0.3) 0%, transparent 70%),
            rgba(16, 12, 29, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 32px 68px rgba(0, 0, 0, 0.44);
    }
    .va-onboard-head {
        display: flex;
        justify-content: space-between;
        gap: .8rem;
        align-items: flex-start;
        margin-bottom: .9rem;
        flex-wrap: wrap;
    }
    .va-onboard-head .headline { font-size: clamp(2rem, 3.6vw, 2.7rem); margin: 0; }
    .va-onboard-head .sub { margin: .35rem 0 0; max-width: 58ch; }
    .va-step-pill {
        border-radius: 999px;
        border: 1px solid rgba(226, 203, 255, .4);
        background: rgba(91, 45, 142, .3);
        color: #f0e5ff;
        font-size: .74rem;
        letter-spacing: .08em;
        text-transform: uppercase;
        font-weight: 700;
        padding: .4rem .7rem;
    }
    #va-onboarding {
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 20px;
        background: rgba(10, 9, 18, 0.58);
        padding: 1rem;
        gap: .9rem;
    }
    #va-onboarding label {
        color: #e5daf7;
        font-size: .86rem;
        letter-spacing: .01em;
    }
    #va-onboarding > div {
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 14px;
        background: rgba(8, 8, 14, 0.46);
        padding: .8rem;
    }
    #va-onboarding input,
    #va-onboarding select,
    #va-onboarding textarea {
        background: rgba(8, 8, 14, 0.76);
        border-color: rgba(255,255,255,.2);
        transition: border-color .24s ease, box-shadow .24s ease;
    }
    #va-onboarding input:focus,
    #va-onboarding select:focus,
    #va-onboarding textarea:focus {
        border-color: rgba(183, 131, 251, 0.8);
        box-shadow: 0 0 0 3px rgba(91, 45, 142, 0.25), 0 0 22px rgba(146, 92, 230, 0.16);
    }
    .task-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: .5rem;
    }
    .task-item {
        display: flex;
        align-items: center;
        gap: .45rem;
        border: 1px solid rgba(255,255,255,.11);
        background: rgba(255,255,255,.03);
        border-radius: 10px;
        padding: .5rem .58rem;
        color: #dfd3f2;
        font-size: .84rem;
    }
    .comm-row {
        display: flex;
        flex-wrap: wrap;
        gap: .55rem;
    }
    .comm-pill {
        display: inline-flex;
        align-items: center;
        gap: .4rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.13);
        background: rgba(255,255,255,.03);
        padding: .45rem .7rem;
        color: #ded3f2;
        font-size: .84rem;
    }
    .va-submit-wrap {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        padding-top: .9rem;
        border-top: 1px solid rgba(255,255,255,.1);
        border-left: none !important;
        border-right: none !important;
        border-bottom: none !important;
        border-radius: 0 !important;
        background: transparent !important;
    }
    @media (max-width: 980px) {
        .task-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 860px) {
        .va-onboard-wrap { margin-top: 1rem; }
        .va-onboard-card { border-radius: 20px; padding: 1rem; }
        #va-onboarding { padding: .75rem; }
        .task-grid { grid-template-columns: 1fr; }
    }
</style></head>
<body>
<div class="ambient"></div>
<div class="portal-shell">
    <aside class="sidebar">
        <p class="brand">Convergr VA Portal</p>
        <a class="nav-link" href="/portal/va/index.html">Dashboard</a>
        <a class="nav-link active" href="/portal/va/onboarding.html">Onboarding</a>
        <a class="nav-link" href="#" data-logout>Logout</a>
    </aside>
    <main class="main container" style="max-width:none;width:auto;">
        <section class="va-onboard-wrap va-onboard-card">
            <div class="va-onboard-head">
                <div>
                    <h1 class="headline">VA Client Onboarding</h1>
                    <p class="sub">Tell us how you work so we can match the right assistant and workflow setup.</p>
                </div>
                <span class="va-step-pill">Setup Form</span>
            </div>
            <form class="grid-2" id="va-onboarding">
                <div><label>Full Name *</label><input required></div>
                <div><label>Email Address *</label><input type="email" required></div>
                <div><label>Phone Number *</label><input required></div>
                <div><label>Business Name *</label><input required></div>
                <div><label>Industry / Business Type *</label><input required></div>
                <div><label>Website URL (optional)</label><input type="url"></div>
                <div><label>Selected Plan</label><select><option>Starter</option><option>Growth</option><option>Ultra</option></select></div>
                <div>
                    <label>How did you hear about Convergr?</label>
                    <select><option>Referral</option><option>Google Search</option><option>Social Media</option><option>Email</option><option>Other</option></select>
                </div>
                <div style="grid-column:1/-1;">
                    <label>Primary tasks needed:</label>
                    <div class="task-grid">
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Email management</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Scheduling</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> CRM/Data Entry</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Lead Follow-Up</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Social Media</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Research</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Document Prep</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Customer Communication</label>
                        <label class="task-item"><input type="checkbox" style="width:auto;"> Other</label>
                    </div>
                </div>
                <div style="grid-column:1/-1;"><label>Tools/software currently used</label><textarea rows="3"></textarea></div>
                <div style="grid-column:1/-1;"><label>Working hours expectations</label><textarea rows="3"></textarea></div>
                <div style="grid-column:1/-1;"><label>Special instructions</label><textarea rows="3"></textarea></div>
                <div style="grid-column:1/-1;">
                    <label>Preferred communication method</label>
                    <div class="comm-row">
                        <label class="comm-pill"><input type="radio" name="comm" style="width:auto;" checked> Slack</label>
                        <label class="comm-pill"><input type="radio" name="comm" style="width:auto;"> Email</label>
                        <label class="comm-pill"><input type="radio" name="comm" style="width:auto;"> WhatsApp</label>
                        <label class="comm-pill"><input type="radio" name="comm" style="width:auto;"> Phone</label>
                    </div>
                </div>
                <div class="va-submit-wrap">
                    <button class="btn btn-primary" type="submit">Complete My Onboarding →</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="/portal/auth.js"></script>
<script>
    requirePortal("va");attachLogout();
    document.getElementById("va-onboarding").addEventListener("submit", (e) => {
        e.preventDefault();
        alert("VA onboarding complete.");
        location.href = "/portal/va/index.html";
    });
</script>
</body>
</html>
